name: Update TwiTips

on:
  schedule:
    - cron: '0 6 * * *'  # Tourne tous les jours à 6h du matin
  workflow_dispatch:       # Permet de lancer manuellement aussi

jobs:
  check-new-vods:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests anthropic yt-dlp faster-whisper

      - name: Check for new VODs and update tips
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_tips.py

      - name: Commit changes if any
        run: |
          git config user.name "TwiTips Bot"
          git config user.email "bot@twitips.io"
          git add index.html scripts/processed_vods.txt
          git diff --staged --quiet || git commit -m "Auto update: nouveaux tips ajoutés"
          git push
